name: Monitor ACP Agent Capabilities

on:
  schedule:
    - cron: '0 1 * * *' # Daily at 9 AM CST (UTC+8)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # Uncomment if any agent uses uvx / Python
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      # - run: pip install uv

      - name: Probe all agents and fetch schemas
        run: node script/check.mjs
        env:
          PROBE_ERRORS_FILE: /tmp/probe-errors.json

      - name: Commit snapshot changes
        id: commit
        run: |
          git config user.name "acp-monitor[bot]"
          git config user.email "acp-monitor[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "No capability changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "### Changes detected:"
            git diff --cached --stat
            echo ""
            git diff --cached -- '*.json' > /tmp/capability-diff.txt
            cat /tmp/capability-diff.txt
            git commit -m "snapshot: capability changes detected $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update issue on capability change
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/capability-diff.txt', 'utf8');
            const date = new Date().toISOString().split('T')[0];

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'capability-change',
            });

            if (existing.data.length > 0) {
              // Append to existing open issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `### Changes detected on ${date}\n\n\`\`\`diff\n${diff}\n\`\`\``,
              });
              console.log(`Commented on existing issue #${existing.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ ACP Capability Changes Detected (${date})`,
                body: `The daily ACP capability monitor detected changes:\n\n\`\`\`diff\n${diff}\n\`\`\`\n\nClose this issue after reviewing the changes.`,
                labels: ['capability-change'],
              });
              console.log(`Created issue #${issue.data.number}`);
            }

      - name: Create or update issue on probe error
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/probe-errors.json';
            if (!fs.existsSync(path)) {
              console.log('No probe errors file found — skipping.');
              return;
            }

            let payload;
            try {
              payload = JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (err) {
              console.log(`Could not parse ${path}: ${err.message}`);
              return;
            }

            const errors = Array.isArray(payload.errors) ? payload.errors : [];
            if (errors.length === 0) {
              console.log('No probe errors recorded — nothing to report.');
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const lines = errors.map((e) => {
              const where = e.command ? `\`${e.command}\`` : (e.url ? `<${e.url}>` : '');
              return `- **${e.name}** (\`${e.id}\`, ${e.type}): ${e.message}${where ? `\n  - ${where}` : ''}`;
            });

            const summary = lines.join('\n');
            const jsonBlock = '```json\n' + JSON.stringify(payload, null, 2) + '\n```';
            const body = [
              `The ACP agent monitor hit ${errors.length} error(s) during this run.`,
              '',
              '### Failing probes',
              summary,
              '',
              `Workflow run: ${runUrl}`,
              '',
              '<details><summary>Machine-readable error payload</summary>',
              '',
              jsonBlock,
              '',
              '</details>',
              '',
              'Snapshots for failing probes were intentionally **not** overwritten; the last-known-good capability data is preserved. Close this issue once the probes are healthy again.',
            ].join('\n');

            // Ensure the probe-error label exists (best-effort).
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'probe-error',
                color: 'b60205',
                description: 'Agent/schema probe failed during monitor run',
              });
            } catch (err) {
              // 422 = already exists; anything else we just log and continue.
              if (err.status !== 422) {
                console.log(`Could not create label (non-fatal): ${err.message}`);
              }
            }

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'probe-error',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `### Probe errors on ${date}\n\n${summary}\n\nWorkflow run: ${runUrl}\n\n<details><summary>Machine-readable error payload</summary>\n\n${jsonBlock}\n\n</details>`,
              });
              console.log(`Commented on existing probe-error issue #${existing.data[0].number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 ACP Agent Probe Error (${date})`,
                body,
                labels: ['probe-error'],
              });
              console.log(`Created probe-error issue #${issue.data.number}`);
            }
