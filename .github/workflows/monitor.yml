name: Monitor ACP Agent Capabilities

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8 AM UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Uncomment if any agent uses uvx / Python
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      # - run: pip install uv

      - name: Probe all agents and fetch schemas
        run: node script/check.mjs

      - name: Commit snapshot changes
        run: |
          git config user.name "acp-monitor[bot]"
          git config user.email "acp-monitor[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "No capability changes detected."
          else
            echo "### Changes detected:"
            git diff --cached --stat
            echo ""
            git diff --cached -- '*.json'
            git commit -m "snapshot: capability changes detected $(date -u +%Y-%m-%d)"
            git push
          fi
